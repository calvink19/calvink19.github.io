<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}

{% seo %}
  </head>

  <style>

::-webkit-scrollbar {
  width: 10px;
}
::-webkit-scrollbar-thumb {
  background-color: #b5e853;
  border-radius: 0rem;
  border: 0px solid #fff;
}


::-webkit-scrollbar-track-piece:start {
  background: transparent;
}

::-webkit-scrollbar-track-piece:end {
  background: transparent;
}
  
  </style>

  <body>

    <header>
      <div class="container">
        <div style="text-align:left;float:left;">
        <a id="a-title" href="{{ '/' | relative_url }}">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>
        </div>
        <span style="text-align:right;float:right;"><a href="https://calvink19.github.io" class="btn"><span class="icon"></span>Index</a> / <a href="https://calvink19.github.io/projects" class="btn"><span class="icon"></span>Projects</a> / <a href="https://calvink19.github.io/sitemap" class="btn"><span class="icon"></span>Sitemap</a> / <a href="https://calvink19.github.io/contact" class="btn"><span class="icon"></span>Contact</a></span>
		<hr style="clear:both;border:none;margin-bottom:0px">
        <!---
        <section id="downloads">
          {% if site.show_downloads %}
            <a href="{{ site.github.zip_url }}" class="btn">Download as .zip</a>
            <a href="{{ site.github.tar_url }}" class="btn">Download as .tar.gz</a>
          {% endif %}
        </section>
        --->
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        <br>
        {{ content }}
        <h6>2024 // CalvinK19</h6>
      </section>
    </div>
  </body>
</html>
